databases:
  - name: automind-db
    plan: free
    databaseName: automind
    user: automind

services:
  # Redis
  - type: redis
    name: automind-redis
    plan: free
    maxmemoryPolicy: allkeys-lru

  # FastAPI Backend
  - type: web
    name: automind-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt && alembic upgrade head && python -m seed.templates
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: automind-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: automind-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: SLACK_WEBHOOK_URL
        value: ""
      - key: FRONTEND_URL
        value: https://automind-frontend.onrender.com
      - key: DEBUG
        value: "false"
      - key: PYTHON_VERSION
        value: "3.12.0"

  # Celery Worker
  - type: worker
    name: automind-worker
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A app.tasks.celery_app:celery_app worker --loglevel=info --concurrency=2
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: automind-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: automind-redis
          type: redis
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: SLACK_WEBHOOK_URL
        value: ""
      - key: DEBUG
        value: "false"
      - key: PYTHON_VERSION
        value: "3.12.0"

  # React Frontend
  - type: web
    name: automind-frontend
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://automind-backend.onrender.com
